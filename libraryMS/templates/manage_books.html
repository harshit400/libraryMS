<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Books</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            animation: fadeInDown 1s ease-out;
        }

        .add-book-section {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            padding: 20px;
            margin-bottom: 30px;
            width: 90%;
            max-width: 600px;
            animation: fadeInUp 0.5s ease-out;
        }

        .add-book-section h2 {
            color: #555;
            margin-top: 0;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #777;
        }

        .form-group input[type="text"],
        .form-group input[type="url"] {
            width: calc(100% - 12px);
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1em;
        }

        .form-actions button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.2s ease-in-out, transform 0.2s ease-in-out;
        }

        .form-actions button:hover {
            background-color: #1e7e34;
            transform: scale(1.05);
        }

        .book-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1200px;
            margin-bottom: 30px;
        }

        .book-card {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            padding: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
            animation: fadeInUp 0.5s ease-out forwards;
            opacity: 0;
        }

        .book-card:nth-child(odd) {
            animation-delay: 0.1s;
        }

        .book-card:nth-child(even) {
            animation-delay: 0.2s;
        }

        .book-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .book-cover {
            width: 100px;
            height: 150px;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 10px;
            transition: transform 0.2s ease-in-out;
        }

        .book-card:hover .book-cover {
            transform: scale(1.05);
        }

        .book-title {
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
        }

        .book-author {
            color: #777;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .book-actions {
            display: flex;
            justify-content: space-around;
        }

        .action-button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background-color 0.2s ease-in-out;
        }

        .action-button:hover {
            background-color: #0056b3;
        }

        .delete-button {
            background-color: #dc3545;
        }

        .delete-button:hover {
            background-color: #c82333;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <h1>Manage Your Books</h1>

    <div class="add-book-section">
        <h2>Add New Book</h2>
        <form action="/admin_manage_books" id="addBookForm" method="post">
            <div class="form-group">
                <label for="title">Title:</label>
                <input type="text" id="title" name="title" required>
            </div>
            <div class="form-group">
                <label for="author">Author:</label>
                <input type="text" id="author" name="author" required>
            </div>
            <div class="form-group">
                <label for="coverUrl">Cover URL (Optional):</label>
                <input type="url" id="coverUrl" name="coverUrl">
            </div>
            <div class="form-actions">
                <button type="submit">Add Book</button>
            </div>
        </form>
    </div>

    {% for book_list in range(books_data|length) %}
    <div class="book-list">
        <div class="book-card">
            <img src="{{books_data[book_list][0]}}" alt="Book Cover {{book_list+1}}" class="book-cover">
            <h3 class="book-title">{{books_data[book_list][1]}}</h3>
            <p class="book-author">{{books_data[book_list][2]}}</p>
            </div>
        </div>
    {% endfor %}

</body>
</html>
